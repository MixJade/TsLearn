<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试竖轴</title>
    <link rel="stylesheet" href="lineCard.min.css">
</head>
<body>
<div class="card-container">
    <!-- 卡片 1 -->
    <div class="card-co">
        <div class="card">
            <div class="card-content">
                <h3>选择题 01</h3>
                <p>遇到问题时，你更习惯的解决方式是？</p>
            </div>
        </div>
        <div class="child-ul">
            <button class="child-add-btn" type="button">+</button>
            <div>A. 独立思考后自行解决</div>
            <div>B. 向身边人请教后解决</div>
            <div>C. 查阅资料寻找方法</div>
            <div>D. 先放一放稍后处理</div>
        </div>
    </div>

    <div class="card-co">
        <div class="card">
            <div class="card-content">
                <h3>选择题 02</h3>
                <p>在学习或工作中，你更看重？(暂无选项)</p>
            </div>
        </div>
        <div class="child-ul">
        </div>
    </div>

    <button class="add-btn" type="button">Add</button>
</div>
</body>
</html>
