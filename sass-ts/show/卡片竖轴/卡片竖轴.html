<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试竖轴</title>
    <link rel="stylesheet" href="lineCard.min.css">
</head>
<body>
<div class="card-container">
    <!-- 卡片 1 -->
    <div class="card">
        <div class="card-content">
            <h3>卡片标题 01</h3>
            <p>这是卡片的描述内容，支持多行文本展示，布局自适应。</p>
        </div>
    </div>

    <!-- 卡片 2 -->
    <div class="card">
        <div class="card-content">
            <h3>卡片标题 02</h3>
            <p>每个卡片都会自动生成左侧连接线，连接到主竖轴。</p>
        </div>
    </div>

    <!-- 卡片 3 -->
    <div class="card">
        <div class="card-content">
            <h3>卡片标题 03</h3>
            <p>使用 SASS 变量管理样式，修改颜色、尺寸非常方便。</p>
        </div>
    </div>

    <button class="add-btn" type="button">Add</button>
</div>
</body>
</html>
