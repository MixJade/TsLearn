<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <!-- 外圈圆环 -->
    <circle cx="256" cy="256" r="230" fill="none" stroke="white" stroke-width="5" opacity="0.55"/>
    <!-- 内圈圆环 -->
    <circle cx="256" cy="256" r="170" fill="none" stroke="white" stroke-width="5" opacity="0.55"/>

    <!-- 刻度短线 -->
    <g stroke="white" stroke-width="4" opacity="0.5">
        <line x1="256" y1="86"  x2="256" y2="106"/>
        <line x1="356" y1="116" x2="376" y2="136"/>
        <line x1="426" y1="256" x2="406" y2="256"/>
        <line x1="356" y1="396" x2="376" y2="376"/>
        <line x1="256" y1="426" x2="256" y2="406"/>
        <line x1="156" y1="396" x2="136" y2="376"/>
        <line x1="86"  y1="256" x2="106" y2="256"/>
        <line x1="156" y1="116" x2="136" y2="136"/>
    </g>

    <!-- 两个小圆装饰 -->
    <circle cx="140" cy="370" r="18" fill="none" stroke="white" stroke-width="4" opacity="0.5"/>
    <circle cx="372" cy="140" r="18" fill="none" stroke="white" stroke-width="4" opacity="0.5"/>

    <!-- 四角菱形角标 -->
    <g fill="white" opacity="0.35" font-family="serif" font-size="24">
        <text x="54"  y="70">◆</text>
        <text x="434" y="70">◆</text>
    </g>

    <!-- 油灯图标（居中） -->
    <g transform="translate(256, 256)">
        <!-- 灯的外轮廓 -->
        <path d="M 0,-100
             C -40,-100 -60,-60 -60,-30
             C -60,0 -40,30 0,60
             C 40,30 60,0 60,-30
             C 60,-60 40,-100 0,-100
             L 0,-120
             C 10,-120 15,-128 15,-135
             C 15,-142 10,-150 0,-150
             C -10,-150 -15,-142 -15,-135
             C -15,-128 -10,-120 0,-120 Z
             M -50,70
             L 50,70
             L 60,100
             L -60,100 Z"
              fill="white" />
        <!-- 内部火焰 -->
        <path d="M 0,-70
             C -20,-70 -30,-40 -30,-20
             C -30,0 -15,15 0,30
             C 15,15 30,0 30,-20
             C 30,-40 20,-70 0,-70 Z"
              fill="white" opacity="0.6" />
    </g>
</svg>
