<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>金色卡片</title>
    <link href="goldCard.min.css" rel="stylesheet">
</head>
<body>
<div class="canvas">
    <div class="card-wrapper">
        <div class="card">

            <!-- 上 70%：lantern.svg 覆盖在金色背景上 -->
            <div class="card-top">
                <img src="lantern.svg" alt="">
            </div>

            <!-- 下 30%：白底黑字 -->
            <div class="card-bottom">
                <span class="card-label">传说卡片</span>
            </div>

        </div>
    </div>
</div>
</body>
</html>
