<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
    <defs>
        <!-- 青绿到军绿渐变背景：左青绿 → 中过渡 → 右军绿 -->
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#2ed5a8"/>
            <stop offset="50%" stop-color="#3a8c5e"/>
            <stop offset="100%" stop-color="#4b5320"/>
        </linearGradient>
        <!-- 反光扫光渐变：中间亮白，两边透明 -->
        <linearGradient id="sheenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
            <stop offset="40%" stop-color="rgba(255,255,255,0.12)"/>
            <stop offset="50%" stop-color="rgba(255,255,255,0.45)"/>
            <stop offset="60%" stop-color="rgba(255,255,255,0.12)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </linearGradient>
        <!-- 金属光晕：左上角放射状高光 -->
        <radialGradient id="glowGrad" cx="40%" cy="35%" r="70%" fx="40%" fy="35%">
            <stop offset="0%" stop-color="rgba(255,245,160,0.32)"/>
            <stop offset="70%" stop-color="rgba(255,245,160,0)"/>
        </radialGradient>
        <!-- 卡片投影 -->
        <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.75"/>
        </filter>
        <!-- 裁剪路径（圆角） -->
        <clipPath id="cardClip">
            <rect x="0" y="0" width="256" height="256"/>
        </clipPath>
    </defs>

    <g clip-path="url(#cardClip)">
        <!-- 1. 青绿到军绿渐变背景 -->
        <rect x="0" y="0" width="256" height="256" fill="url(#goldGrad)" filter="url(#cardShadow)"/>
        <!-- 1.5 右半边黑色遮罩（透明度0.1） -->
        <rect x="128" y="0" width="128" height="256" fill="#000000" opacity="0.1"/>
        <!-- 2. 金色边框光晕 -->
        <rect x="0" y="0" width="256" height="256"
              fill="none" stroke="rgba(255,215,50,0.18)" stroke-width="1"/>
        <!-- 3. 金属光晕叠层（椭圆放射渐变） -->
        <rect x="0" y="0" width="256" height="256" fill="url(#glowGrad)"/>
        <!-- 4. 反光扫光特效：斜线白色条纹往复扫描 -->
        <g transform="rotate(-20, 128, 128)">
            <rect x="-154" y="-50" width="90" height="360" fill="url(#sheenGrad)"
                  style="mix-blend-mode:overlay;">
                <animateTransform attributeName="transform"
                                  values="-154,0; 410,0; -154,0"
                                  keyTimes="0; 0.5; 1"
                                  dur="5.6s"
                                  repeatCount="indefinite"
                                  calcMode="spline"
                                  keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>
            </rect>
        </g>
    </g>
</svg>
