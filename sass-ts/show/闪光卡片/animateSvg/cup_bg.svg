<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
    <defs>
        <!-- ===== 血红主背景渐变（深红底，衬托波浪） ===== -->
        <radialGradient id="bloodGrad" cx="50%" cy="35%" r="75%" fx="50%" fy="35%">
            <stop offset="0%" stop-color="#a01010"/>
            <stop offset="35%" stop-color="#6e0000"/>
            <stop offset="75%" stop-color="#3e0000"/>
            <stop offset="100%" stop-color="#1a0000"/>
        </radialGradient>

        <!-- ===== 后景波浪渐变（暗红） ===== -->
        <linearGradient id="waveBackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#8a0808"/>
            <stop offset="40%" stop-color="#5a0000"/>
            <stop offset="100%" stop-color="#2a0000"/>
        </linearGradient>

        <!-- ===== 前景波浪渐变（鲜红） ===== -->
        <linearGradient id="waveFrontGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ff2a2a"/>
            <stop offset="35%" stop-color="#ee0000"/>
            <stop offset="100%" stop-color="#9a0000"/>
        </linearGradient>

        <!-- ===== 边缘暗边 ===== -->
        <radialGradient id="rimDark" cx="50%" cy="50%" r="50%">
            <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
            <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
        </radialGradient>

        <!-- ===== 裁剪用 ===== -->
        <clipPath id="cardClip">
            <rect x="0" y="0" width="256" height="256"/>
        </clipPath>
    </defs>

    <!-- ========== 卡片底层背景 ========== -->
    <rect x="0" y="0" width="256" height="256"
          fill="url(#bloodGrad)"/>

    <!-- ========== 波浪层 ========== -->
    <g clip-path="url(#cardClip)">
        <!-- 后景波浪（暗红，流速慢，波幅大，位置偏上） -->
        <g>
            <animateTransform attributeName="transform"
                              values="0,0; 0,7; 0,-5; 0,4; 0,0" dur="5.2s" repeatCount="indefinite"
                              calcMode="spline"
                              keySplines="0.4,0,0.6,1;0.4,0,0.6,1;0.4,0,0.6,1;0.4,0,0.6,1"/>
            <path d="M 0,78 Q 64,48 128,78 T 256,78 T 384,78 T 512,78 L 512,256 L 0,256 Z"
                  fill="url(#waveBackGrad)" opacity="0.88">
                <animateTransform attributeName="transform"
                                  values="0,0; -256,0" dur="10s" repeatCount="indefinite"/>
            </path>
        </g>

        <!-- 前景波浪（鲜红，流速快，波幅稍小，位置偏下） -->
        <g>
            <animateTransform attributeName="transform"
                              values="0,0; 0,-5; 0,6; 0,-3; 0,0" dur="4.3s" repeatCount="indefinite"
                              calcMode="spline"
                              keySplines="0.4,0,0.6,1;0.4,0,0.6,1;0.4,0,0.6,1;0.4,0,0.6,1"/>
            <path d="M 0,128 Q 64,104 128,128 T 256,128 T 384,128 T 512,128 L 512,256 L 0,256 Z"
                  fill="url(#waveFrontGrad)" opacity="0.92">
                <animateTransform attributeName="transform"
                                  values="0,0; -256,0" dur="5s" repeatCount="indefinite"/>
            </path>
        </g>

        <!-- 前景波浪顶部高光线（液面反光） -->
        <g>
            <animateTransform attributeName="transform"
                              values="0,0; 0,-5; 0,6; 0,-3; 0,0" dur="4.3s" repeatCount="indefinite"
                              calcMode="spline"
                              keySplines="0.4,0,0.6,1;0.4,0,0.6,1;0.4,0,0.6,1;0.4,0,0.6,1"/>
            <path d="M 0,128 Q 64,104 128,128 T 256,128 T 384,128 T 512,128"
                  fill="none" stroke="#ff7070" stroke-width="1.5" opacity="0.45">
                <animateTransform attributeName="transform"
                                  values="0,0; -256,0" dur="5s" repeatCount="indefinite"/>
            </path>
        </g>
    </g>

    <!-- ========== 边缘压暗 ========== -->
    <rect x="0" y="0" width="256" height="256"
          fill="url(#rimDark)" clip-path="url(#cardClip)"/>
</svg>
