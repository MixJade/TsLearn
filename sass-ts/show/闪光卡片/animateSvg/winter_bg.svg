<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
    <defs>
        <!-- 暗银色渐变背景 -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#5a5a6e"/>
            <stop offset="25%" stop-color="#7a7a8e"/>
            <stop offset="50%" stop-color="#5a5a6e"/>
            <stop offset="75%" stop-color="#4a4a5e"/>
            <stop offset="100%" stop-color="#6a6a7e"/>
        </linearGradient>

        <!-- 卡片阴影滤镜 -->
        <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
            <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
        </filter>

        <!-- 内发光（顶部高光） -->
        <filter id="innerGlow">
            <feFlood flood-color="#fff" flood-opacity="0.15" result="glow"/>
            <feComposite in="glow" in2="SourceGraphic" operator="in"/>
        </filter>
    </defs>

    <!-- 背景矩形（银色渐变） -->
    <rect x="0" y="0" width="256" height="256" fill="url(#bgGrad)" filter="url(#cardShadow)"/>

    <!-- 顶部高光线 -->
    <rect x="0" y="0" width="256" height="1" fill="#fff" opacity="0.15"/>

    <!-- ========== 第一层：大雪花 慢速 10s（r×2, 15→10）========== -->
    <g opacity="0.95">
        <circle cx="8" cy="-106.7" r="3" fill="#fff">
            <animateTransform begin="0.0s" attributeName="transform"
                              from="0,0" to="5,256" dur="10s" repeatCount="indefinite"/>
        </circle>
        <circle cx="36" cy="-96" r="3" fill="#fff">
            <animateTransform begin="0.2s" attributeName="transform"
                              from="10,0" to="6,256" dur="10s" repeatCount="indefinite"/>
        </circle>
        <circle cx="61" cy="-74.7" r="3" fill="#fff" opacity="0.9">
            <animateTransform begin="0.4s" attributeName="transform"
                              from="-8,0" to="-5,256" dur="10s" repeatCount="indefinite"/>
        </circle>
        <circle cx="108" cy="-10.7" r="3" fill="#fff" opacity="0.9">
            <animateTransform begin="0.6s" attributeName="transform"
                              from="-4,0" to="-3,256" dur="10s" repeatCount="indefinite"/>
        </circle>
        <circle cx="143" cy="-106.7" r="2.5" fill="#fff" opacity="0.85">
            <animateTransform begin="0.8s" attributeName="transform"
                              from="5,0" to="3,256" dur="10s" repeatCount="indefinite"/>
        </circle>
        <circle cx="156" cy="-53.3" r="3" fill="#fff" opacity="0.9">
            <animateTransform begin="1.0s" attributeName="transform"
                              from="0,0" to="0,256" dur="10s" repeatCount="indefinite"/>
        </circle>
        <circle cx="179" cy="-21.3" r="3" fill="#fff" opacity="0.95">
            <animateTransform begin="1.2s" attributeName="transform"
                              from="-3,0" to="-2,256" dur="10s" repeatCount="indefinite"/>
        </circle>
        <circle cx="202" cy="-32" r="3" fill="#fff" opacity="0.9">
            <animateTransform begin="1.4s" attributeName="transform"
                              from="6,0" to="4,256" dur="10s" repeatCount="indefinite"/>
        </circle>
        <circle cx="225" cy="-64" r="3" fill="#fff" opacity="0.95">
            <animateTransform begin="1.6s" attributeName="transform"
                              from="0,0" to="0,256" dur="10s" repeatCount="indefinite"/>
        </circle>
        <circle cx="236" cy="0" r="2.5" fill="#fff" opacity="0.85">
            <animateTransform begin="1.8s" attributeName="transform"
                              from="7,0" to="4,256" dur="10s" repeatCount="indefinite"/>
        </circle>
    </g>

    <!-- ========== 第二层：中雪花 中速 7s（r×2, 13→9）========== -->
    <g opacity="0.9">
        <circle cx="5" cy="-69.3" r="2" fill="#fff">
            <animateTransform begin="2.0s" attributeName="transform"
                              from="-10,0" to="-6,256" dur="7s" repeatCount="indefinite"/>
        </circle>
        <circle cx="41" cy="-88" r="2" fill="#fff" opacity="0.75">
            <animateTransform begin="2.2s" attributeName="transform"
                              from="-8,0" to="-5,256" dur="7s" repeatCount="indefinite"/>
        </circle>
        <circle cx="74" cy="-61.3" r="2" fill="#fff" opacity="0.85">
            <animateTransform begin="2.4s" attributeName="transform"
                              from="-6,0" to="-4,256" dur="7s" repeatCount="indefinite"/>
        </circle>
        <circle cx="97" cy="-98.7" r="2" fill="#fff" opacity="0.9">
            <animateTransform begin="2.6s" attributeName="transform"
                              from="0,0" to="0,256" dur="7s" repeatCount="indefinite"/>
        </circle>
        <circle cx="133" cy="-72" r="2" fill="#fff" opacity="0.75">
            <animateTransform begin="2.8s" attributeName="transform"
                              from="0,0" to="0,256" dur="7s" repeatCount="indefinite"/>
        </circle>
        <circle cx="169" cy="-40" r="2" fill="#fff" opacity="0.85">
            <animateTransform begin="3.0s" attributeName="transform"
                              from="0,0" to="0,256" dur="7s" repeatCount="indefinite"/>
        </circle>
        <circle cx="192" cy="-58.7" r="2" fill="#fff" opacity="0.9">
            <animateTransform begin="3.2s" attributeName="transform"
                              from="3,0" to="2,256" dur="7s" repeatCount="indefinite"/>
        </circle>
        <circle cx="202" cy="-10.7" r="2" fill="#fff" opacity="0.8">
            <animateTransform begin="3.4s" attributeName="transform"
                              from="0,0" to="0,256" dur="7s" repeatCount="indefinite"/>
        </circle>
        <circle cx="120" cy="-120" r="2" fill="#fff" opacity="0.85">
            <animateTransform begin="3.6s" attributeName="transform"
                              from="7,0" to="4,256" dur="7s" repeatCount="indefinite"/>
        </circle>
    </g>

    <!-- ========== 第三层：小雪花 较快 5s（r×2, 15→10）========== -->
    <g opacity="0.8">
        <circle cx="3" cy="-101.3" r="1.2" fill="#fff">
            <animateTransform begin="4.0s" attributeName="transform"
                              from="5,0" to="3,256" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="23" cy="-80" r="1.2" fill="#fff" opacity="0.75">
            <animateTransform begin="4.2s" attributeName="transform"
                              from="7,0" to="4,256" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="54" cy="-58.7" r="1.2" fill="#fff" opacity="0.7">
            <animateTransform begin="4.4s" attributeName="transform"
                              from="9,0" to="6,256" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="84" cy="-69.3" r="1.2" fill="#fff" opacity="0.8">
            <animateTransform begin="4.6s" attributeName="transform"
                              from="4,0" to="3,256" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="115" cy="-16" r="1.2" fill="#fff" opacity="0.65">
            <animateTransform begin="4.8s" attributeName="transform"
                              from="6,0" to="4,256" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="146" cy="-106.7" r="1.2" fill="#fff" opacity="0.75">
            <animateTransform begin="5.0s" attributeName="transform"
                              from="8,0" to="5,256" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="166" cy="-5.3" r="1.2" fill="#fff" opacity="0.8">
            <animateTransform begin="5.2s" attributeName="transform"
                              from="-7,0" to="-4,256" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="187" cy="-32" r="1.2" fill="#fff" opacity="0.75">
            <animateTransform begin="5.4s" attributeName="transform"
                              from="0,0" to="0,256" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="44" cy="-117.3" r="1.2" fill="#fff" opacity="0.8">
            <animateTransform begin="5.6s" attributeName="transform"
                              from="-6,0" to="-4,256" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="125" cy="-96" r="1.2" fill="#fff" opacity="0.8">
            <animateTransform begin="5.8s" attributeName="transform"
                              from="0,0" to="0,256" dur="5s" repeatCount="indefinite"/>
        </circle>
    </g>

    <!-- ========== 第四层：微雪花 快速 3.5s（r×2, 18→13）========== -->
    <g opacity="0.6">
        <circle cx="5" cy="-112" r="0.8" fill="#fff">
            <animateTransform begin="6.0s" attributeName="transform"
                              from="-6,0" to="-4,256" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="26" cy="-34.7" r="0.8" fill="#fff" opacity="0.55">
            <animateTransform begin="6.2s" attributeName="transform"
                              from="0,0" to="0,256" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="56" cy="-16" r="0.8" fill="#fff" opacity="0.5">
            <animateTransform begin="6.4s" attributeName="transform"
                              from="0,0" to="0,256" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="87" cy="-24" r="0.8" fill="#fff" opacity="0.6">
            <animateTransform begin="6.6s" attributeName="transform"
                              from="0,0" to="0,256" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="118" cy="-117.3" r="0.8" fill="#fff" opacity="0.45">
            <animateTransform begin="6.8s" attributeName="transform"
                              from="0,0" to="0,256" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="148" cy="-88" r="0.8" fill="#fff" opacity="0.55">
            <animateTransform begin="7.0s" attributeName="transform"
                              from="0,0" to="0,256" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="169" cy="-13.3" r="0.8" fill="#fff" opacity="0.6">
            <animateTransform begin="7.2s" attributeName="transform"
                              from="4,0" to="3,256" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="200" cy="-18.7" r="0.8" fill="#fff" opacity="0.45">
            <animateTransform begin="7.4s" attributeName="transform"
                              from="7,0" to="4,256" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="220" cy="-45.3" r="0.8" fill="#fff" opacity="0.5">
            <animateTransform begin="7.6s" attributeName="transform"
                              from="-10,0" to="-6,256" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="230" cy="-8" r="0.8" fill="#fff" opacity="0.55">
            <animateTransform begin="7.8s" attributeName="transform"
                              from="3,0" to="2,256" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="46" cy="-53.3" r="0.8" fill="#fff" opacity="0.6">
            <animateTransform begin="8.0s" attributeName="transform"
                              from="8,0" to="5,256" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="97" cy="-80" r="0.8" fill="#fff" opacity="0.5">
            <animateTransform begin="8.2s" attributeName="transform"
                              from="-7,0" to="-4,256" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="128" cy="-69.3" r="0.8" fill="#fff" opacity="0.6">
            <animateTransform begin="8.4s" attributeName="transform"
                              from="-3,0" to="-2,256" dur="3.5s" repeatCount="indefinite"/>
        </circle>
    </g>

    <!-- ========== 第五层：密雪层 8s（r×2, 16→11）========== -->
    <g opacity="0.75">
        <circle cx="8" cy="-80" r="1.5" fill="#fff">
            <animateTransform begin="8.0s" attributeName="transform"
                              from="7,0" to="4,256" dur="8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="54" cy="-48" r="1.5" fill="#fff" opacity="0.6">
            <animateTransform begin="8.2s" attributeName="transform"
                              from="0,0" to="0,256" dur="8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="84" cy="-58.7" r="1.5" fill="#fff" opacity="0.65">
            <animateTransform begin="8.4s" attributeName="transform"
                              from="8,0" to="5,256" dur="8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="131" cy="-26.7" r="1.5" fill="#fff" opacity="0.75">
            <animateTransform begin="8.6s" attributeName="transform"
                              from="4,0" to="3,256" dur="8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="161" cy="-37.3" r="1.5" fill="#fff" opacity="0.7">
            <animateTransform begin="8.8s" attributeName="transform"
                              from="-8,0" to="-5,256" dur="8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="207" cy="-5.3" r="1.5" fill="#fff" opacity="0.65">
            <animateTransform begin="9.0s" attributeName="transform"
                              from="-4,0" to="-3,256" dur="8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="223" cy="-85.3" r="1.5" fill="#fff" opacity="0.7">
            <animateTransform begin="9.2s" attributeName="transform"
                              from="9,0" to="6,256" dur="8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="18" cy="-64" r="1.5" fill="#fff" opacity="0.75">
            <animateTransform begin="9.4s" attributeName="transform"
                              from="-6,0" to="-4,256" dur="8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="79" cy="-32" r="1.5" fill="#fff" opacity="0.7">
            <animateTransform begin="9.6s" attributeName="transform"
                              from="0,0" to="0,256" dur="8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="172" cy="-10.7" r="1.5" fill="#fff" opacity="0.75">
            <animateTransform begin="9.8s" attributeName="transform"
                              from="7,0" to="4,256" dur="8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="115" cy="-90.7" r="1.5" fill="#fff" opacity="0.6">
            <animateTransform begin="10.0s" attributeName="transform"
                              from="-7,0" to="-4,256" dur="8s" repeatCount="indefinite"/>
        </circle>
    </g>
</svg>
