<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>收藏夹模板</title>
    <style>
        /* 基础区域 */
        #basePage {
            position: absolute;
            width: 60%;
            left: 20%;
            top: 5%;
        }

        /* 用户区域 */
        .rolePa {
            position: absolute;
            left: 10%;
            width: 100%;
            border: 5px solid #ccc; /*自定义边框样式、颜色等*/
        }

        .rolePa ul {
            list-style: none;
        }

        a {
            text-decoration: none;
        }

        /*向上消失动画*/
        @keyframes byeBye {
            100% {
                transform: translateY(-110%);
                opacity: 0;
            }
        }

        /*向下出现动画*/
        @keyframes hello {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /*左侧导航*/
        #radio-button-group {
            position: absolute;
            left: 10%;
            top: 10%;
            align-items: center;
            display: flex;
            flex-direction: column;
        }

        .radio-button {
            display: none;
        }

        .radio-label {
            padding: 8px 15px;
            border: 1px solid #000;
            font-weight: bold;
            cursor: pointer;
            background-color: transparent;
            color: #000;
            transition: all 0.3s;
        }

        .radio-button:checked + .radio-label {
            background-color: #5b88ea;
            color: #fff;
        }

        .radio-label:not(:last-child):not(.radio-button:checked + .radio-label) {
            border-bottom: none;
        }
    </style>
</head>

<body>
<!--左侧导航-->
<div id="radio-button-group">
    <input type="radio" class="radio-button" name="vb-radio" id="vb-radio1" onclick="sayHi(0)" checked>
    <label class="radio-label" for="vb-radio1">群贤毕至</label>
    <input type="radio" class="radio-button" name="vb-radio" id="vb-radio2" onclick="sayHi(1)">
    <label class="radio-label" for="vb-radio2">狗头军师</label>
    <input type="radio" class="radio-button" name="vb-radio" id="vb-radio3" onclick="sayHi(2)">
    <label class="radio-label" for="vb-radio3">其他补充</label>
</div>

<!--面板一-->
<div id="basePage">
    <div class="rolePa">
        <ul>
            <li><a href="https://blog.csdn.net/weixin_42905141/article/details/124071137">「安装Typora」</a></li>
            <li><a href="https://www.bilibili.com/read/cv18230089/">「Navicat安装」</a></li>
            <li><a href="https://www.linuxcapable.com/how-to-install-oracle-java-17-on-linux-mint/">「Java17安装」</a>
            </li>
            <li><a href="https://blog.csdn.net/qq_51246603/article/details/127474314">「安装IDEA」</a></li>
            <li><a href="https://zhuanlan.zhihu.com/p/144885938">「安装Node.js」</a>记得将14.x改成18.x</li>
            <li><a href="https://www.microsoft.com/zh-cn/edge?form=MA13FJ#evergreen">「Edge下载」</a></li>
            <li>你好</li>
        </ul>
    </div>
    <!-- 面板二 -->
    <div class="rolePa" style="z-index: 9;display: none;">
        <ul>
            <li><a href="https://blog.csdn.net/qq_42843894/article/details/112639174">「使用SSH连接Github」</a></li>
            <li><a href="https://blog.csdn.net/wangye8312166/article/details/86573832">「彻底卸载MySQL」</a></li>
            <li><a href="https://blog.csdn.net/hai1124948893/article/details/107297582">「MySQL初始化root用户」</a></li>
            <li><a href="https://www.likecs.com/show-205296529.html">「Linux寻找JAVA路径」</a>可举一反三</li>
            <li>「sudo kill -s 9 进程号」  ==》用这个杀死进程</li>
            <li><a href="https://wenku.csdn.net/answer/d8644b5d773c0baf5c6c4ec5e40012ab">「Linux Mint调节亮度」</a></li>
        </ul>
    </div>
    <!-- 面板三 -->
    <div class="rolePa" style="z-index: 9;display: none;">
        <ul>
            <li><a href="https://blog.csdn.net/weixin_45732391/article/details/118719802">「IDEA默认设置」</a>不用每次都设置Maven</li>
            <li>发过火</li>
            <li>发过火</li>
        </ul>
    </div>
</div>
</body>
<script>
    const rolePa = document.getElementsByClassName("rolePa");
    let a = 0;
    const sayHi = b => {
        rolePa[a].style.animation = "byeBye 1.2s forwards";
        rolePa[b].style.display = "";
        rolePa[b].style.animation = "hello 1.2s forwards";
        a = b;
    }
</script>

</html>
