<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>水滴信息展示</title>
    <style>
        body {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" preserveAspectRatio="none"><rect width="1000" height="30" fill="lightblue"/><path d="M0 30 Q500 130 ,1000 30" stroke="transparent" fill="lightblue"/></svg>');
            background-size: 100vw 100vh;
            background-repeat: no-repeat;
            background-color: #f8f9fa;
        }



        .circle {
            width: 120px;
            height: 120px;
            border: 5px solid orange;
            border-radius: 50%;
            border-bottom: none;
            /*居中*/
            position: fixed;
            top: 10%;
            left: 50%;
            margin-left: -50px;
            /*文字居中*/
            text-align: center;
        }

        .circle span {
            /*字体字号*/
            font-size: large;
            width: 100px;
            /*定位*/
            color: #f8f9fa;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
    </style>
</head>

<body>
    <div class="circle">
        <span>10,000元</h2>
    </div>
</body>

</html>
