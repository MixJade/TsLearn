<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>三等分的圆</title>
    <style>
        .circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border-radius: 50%;
            overflow: hidden;
        }

        .part {
            position: absolute;
            width: 100%;
            height: 100%;
            clip-path: polygon(50% 50%, -35% 0, 135% 0);
            display: grid; /* 利用grid布局实现居中 */
            justify-items: center; /* 水平居中 */
            align-items: start; /* 垂直居中 */
        }

        .part .con {
            padding-top: 50px;
            width: 67px;
            height: 38px;
            /*background-color: #4CAF50;*/
            text-align: center;
        }

        .happy {
            position: absolute;
            background-color: #FFB46B;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            width: 64px;
            height: 64px;
            margin-left: -32px;
            margin-top: -32px;
            text-align: center;
        }

        .one {
            background-color: #F7CDD4;
        }

        .two {
            background-color: #C6947D;
            transform: rotate(120deg);
        }

        .three {
            background-color: #A3DCBE;
            transform: rotate(240deg);
        }

        .hover-effect {
            transition: transform .2s; /* Animation */
        }

        .hover-effect:hover {
            transform: scale(1.5); /* (150% zoom - Note: if the zoom is too large, it will go outside of the viewport) */
        }
    </style>
</head>
<body>
<div class="circle">
    <div class="part one">
        <div class="con hover-effect">
            典
        </div>
    </div>
    <div class="part two">
        <div class="con hover-effect">
            孝
        </div>
    </div>
    <div class="part three">
        <div class="con hover-effect">
            急
        </div>
    </div>
    <div class="happy hover-effect">乐</div>
</div>
</body>
</html>
