<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>使用表格进行排版.html</title>
    <style>
        .my-show-tab{
            text-align: center;
        }
    </style>
</head>
<body>
<table class="my-show-tab">
    <tr>
        <td colspan="2">Row 1</td>
    </tr>
    <tr>
        <td>Row 2, Column 1</td>
        <td>Row 2, Column 2</td>
    </tr>
    <tr>
        <td>Row 3, Column 1</td>
        <td>Row 3, Column 2</td>
    </tr>
    <tr>
        <td colspan="2">Row 4</td>
    </tr>
    <tr>
        <td colspan="2">Row 5</td>
    </tr>
</table>
</body>
</html>
