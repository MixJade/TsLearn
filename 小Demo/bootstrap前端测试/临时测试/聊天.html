<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>聊天室</title>
    <link href="../assets/bootstrap.min.css" rel="stylesheet">
    <style>
        .myImg {
            height: 64px;
            width: 64px;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container p-2">
        <div class="card">
            <div class=" card-header bg-primary text-light d-flex justify-content-between align-items-center">
                <span><i class="bi bi-gear-wide-connected"></i>&nbsp;消息往来</span>
                <a class="text-light" href="#">返回>></a>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="panel-container col-sm-12 col-md-2">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item">
                                <i class="bi bi-door-open-fill"></i>&nbsp;<b>当前医生</b>
                            </li>
                            <li class="list-group-item">李医生</li>
                        </ul>
                        <ul class="list-group list-group-flush" style="cursor: pointer;">
                            <li class="list-group-item">
                                <i class="bi bi-person-lines-fill"></i>&nbsp;<b>其它联系医生</b>
                            </li>
                            <li class="list-group-item" onclick="cutDoctor(23)">易大夫</li>
                            <li class="list-group-item" onclick="cutDoctor(34)">李大夫</li>
                            <li class="list-group-item" onclick="cutDoctor(45)">王大夫</li>
                        </ul>
                    </div>
                    <!-- 消息显示 -->
                    <div class="col-sm-12 col-md-8" style="height: 450px; overflow-y: scroll;">
                        <div class="container" id="msgContainer">
                        </div>
                    </div>
                    <!-- 发送框-->
                    <div class="card-footer">
                        <div class="input-group">
                            <label class="mx-3" for="myFile">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor"
                                    class="bi bi-image" viewBox="0 0 16 16">
                                    <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z" />
                                    <path
                                        d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2h-12zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1h12z" />
                                </svg>
                            </label>
                            <input type="file" id="myFile" accept="image/*" hidden="hidden" />
                            <label for="waitSend"></label><input type="text" class="form-control" placeholder="输入消息"
                                id="waitSend" />
                            <button class="btn btn-primary" onclick="sendMsg()">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                    class="bi bi-send" viewBox="0 0 16 16">
                                    <path
                                        d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576 6.636 10.07Zm6.787-8.201L1.591 6.602l4.339 2.76 7.494-7.493Z" />
                                </svg>
                                发送
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="../assets/bootstrap.bundle.min.js"></script>
<script>
    window.onload = () => {
        readMsg()
    }
    const msgContainer = document.getElementById("msgContainer");

    // 读取消息列表
    function readMsg() {
        const msg = [
            {
                clientName: "张三",
                doctorName: "李医生",
                isClient: true,
                msgContent: "你好",
                createTime: "2023-2-25 19:14:22",
                photo: "../picture/lei-jun.jpg"
            },
            {
                clientName: "张三",
                doctorName: "李医生",
                isClient: false,
                msgContent: "你好",
                createTime: "2023-2-25 19:14:22",
                photo: "../picture/lei-jun.jpg"
            },
            {
                clientName: "张三",
                doctorName: "李医生",
                isClient: true,
                msgContent: "你好",
                createTime: "2023-2-25 19:14:22",
                photo: "../picture/lei-jun.jpg"
            },
            {
                clientName: "张三",
                doctorName: "李医生",
                isClient: false,
                msgContent: "你好",
                createTime: "2023-2-25 19:14:22",
                photo: "../picture/lei-jun.jpg"
            },
            {
                clientName: "张三",
                doctorName: "李医生",
                isClient: true,
                msgContent: "你好",
                createTime: "2023-2-25 19:14:22",
                photo: "../picture/lei-jun.jpg"
            },
            {
                clientName: "张三",
                doctorName: "李医生",
                isClient: false,
                msgContent: "你好",
                createTime: "2023-2-25 19:14:22",
                photo: "../picture/lei-jun.jpg"
            }
        ];
        for (let i = 0; i < msg.length; i++) readMsaA(msg[i])
    }

    // 读取并处理一行消息
    function readMsaA(ele) {
        const { clientName, doctorName, isClient, msgContent, createTime, photo } = ele;
        if (isClient) writeClient(clientName, msgContent, createTime, photo)
        else writeDoctor(doctorName, msgContent, createTime, photo)
    }

    // 写入用户消息
    function writeClient(clientName, msgContent, createTime, photo) {
        msgContainer.innerHTML += `<div class="d-flex justify-content-end my-3">
                                <div class="card bg-primary text-light w-50 ">
                                    <div class="card-body">
                                        <div class="card-title">
                                            <b>${clientName} ${createTime}</b>
                                        </div>
                                        <div class="card-text">
                                            ${msgContent}
                                        </div>
                                    </div>
                                </div>
                                <img src="${photo}" class="rounded-circle myImg" alt="" />
                            </div>`
    }

    // 写入医生消息
    function writeDoctor(doctorName, msgContent, createTime, photo) {
        msgContainer.innerHTML += `<div class="d-flex justify-content-start my-3">
                                <img src="${photo}" class="rounded-circle myImg" alt="" />
                                <div class="card w-50">
                                    <div class="card-body">
                                        <div class="card-title">
                                            <b>${doctorName} ${createTime}</b>
                                        </div>
                                        <div class="card-text">
                                            ${msgContent}
                                        </div>
                                    </div>
                                </div>
                            </div>`
    }

    // 点击其它的大夫
    function cutDoctor(doctorID) {
        alert(doctorID)
    }

    // 点击发送按钮
    function sendMsg() {
        const waitSend = document.getElementById("waitSend");
        const content = waitSend.value;
        waitSend.value = "";
        if (content === "") return;
        alert(content)
    }
</script>

</html>
